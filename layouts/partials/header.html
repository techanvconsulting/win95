<div style="
  background: linear-gradient(90deg, rgba(0,0,128,0.92) 0%, rgba(0,0,160,0.88) 60%, rgba(16,100,200,0.85) 100%);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 2px solid rgba(120,160,255,0.35);
  box-shadow: 0 2px 0 rgba(255,255,255,0.08) inset, 0 4px 24px rgba(0,0,60,0.7);
  position: sticky;
  top: 0;
  z-index: 100;
">
  {{/* Win95 title bar */}}
  <div style="
    display: flex;
    align-items: center;
    padding: 5px 12px 4px;
    border-bottom: 1px solid rgba(80,120,200,0.3);
    gap: 8px;
  ">
    <span style="
      color: white;
      font-weight: bold;
      font-size: 0.82rem;
      letter-spacing: 0.5px;
      font-family: 'Segoe UI', Tahoma, sans-serif;
      text-shadow: 1px 1px 0 rgba(0,0,80,0.8);
      display: flex;
      align-items: center;
      gap: 6px;
    ">
      <span style="font-size:0.7rem; opacity:0.8;">▣</span>
      {{ site.Title }} — {{ site.Params.mainpagesubtitle }}
    </span>
  </div>
  {{/* Navigation menu bar */}}
  {{ partial "menu.html" (dict "menuID" "main" "page" .) }}
</div>
