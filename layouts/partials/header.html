<div style="background: linear-gradient(90deg, rgba(0,0,128,0.95) 0%, rgba(16,132,208,0.9) 100%); backdrop-filter: blur(10px); border-bottom: 2px solid rgba(100,160,255,0.4); padding: 0; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 20px rgba(0,0,80,0.6);">
  <div style="display:flex; align-items:center; justify-content:space-between; padding: 6px 16px; border-bottom: 1px solid rgba(100,160,255,0.2);">
    <div style="display:flex; align-items:center; gap: 8px;">
      <span style="color:white; font-weight:bold; font-size:1rem; letter-spacing:1px; text-transform:uppercase; text-shadow: 1px 1px 0 rgba(0,0,0,0.5);">▣ {{ site.Title }}</span>
    </div>
    <div style="display:flex; gap:6px;">
      <span style="width:12px;height:12px;background:#fbbf24;border-radius:0;border:1px solid rgba(255,200,0,0.5);display:inline-block;cursor:pointer;" title="minimize"></span>
      <span style="width:12px;height:12px;background:#34d399;border-radius:0;border:1px solid rgba(0,200,100,0.5);display:inline-block;cursor:pointer;" title="maximize"></span>
      <span style="width:12px;height:12px;background:#f87171;border-radius:0;border:1px solid rgba(255,100,100,0.5);display:inline-block;cursor:pointer;" title="close"></span>
    </div>
  </div>
  {{ partial "menu.html" (dict "menuID" "main" "page" .) }}
</div>
