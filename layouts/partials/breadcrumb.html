<div style="
  max-width: 900px;
  margin: 0 auto;
  padding: 0.75rem 1rem 0;
  display: flex;
  align-items: center;
  gap: 0.5rem;
  font-family: monospace;
  font-size: 0.78rem;
">
  <a href="/" style="
    display: inline-flex;
    align-items: center;
    gap: 5px;
    color: #93c5fd;
    text-decoration: none;
    background: rgba(0,30,100,0.55);
    border: 1px solid rgba(100,160,255,0.3);
    border-top: 1px solid rgba(180,220,255,0.4);
    border-left: 1px solid rgba(180,220,255,0.4);
    padding: 3px 10px 3px 8px;
  ">◄ HOME</a>
  {{ if not .IsHome }}
    <span style="color:#334155;">›</span>
    {{ if .Parent }}
      <a href="{{ .Parent.RelPermalink }}" style="color:#64748b; text-decoration:none;">{{ .Parent.Title | upper }}</a>
      <span style="color:#334155;">›</span>
    {{ end }}
    <span style="color:#64748b;">{{ .Title | upper | truncate 40 }}</span>
  {{ end }}
</div>
