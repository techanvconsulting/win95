{{ define "main" }}
{{ partial "breadcrumb.html" . }}
<div style="max-width:900px; margin:0 auto; padding: 1rem 1rem 2rem;">
  <div class="win95-panel">
    <div class="win95-titlebar">▣ {{ .Title | upper | truncate 60 }}</div>
    <div style="padding:2rem;">

      <div style="margin-bottom:1.5rem; padding-bottom:1rem; border-bottom:1px solid rgba(100,160,255,0.15);">
        <h1 style="font-size:1.7rem; color:#fff; margin:0 0 0.75rem; line-height:1.3; text-shadow: 0 0 20px rgba(100,180,255,0.4);">{{ .Title }}</h1>
        <div style="display:flex; flex-wrap:wrap; gap:1rem; align-items:center;">
          <time style="color:#475569; font-size:0.8rem; font-family:monospace;">{{ .Date | time.Format "2006-01-02 15:04" }}</time>
          {{ with .Params.author }}<span style="color:#475569; font-size:0.8rem;">by {{ . }}</span>{{ end }}
        </div>
      </div>

      <div style="color:#e2e8f0; line-height:1.8; font-size:0.95rem;">
        {{ .Content }}
      </div>

      {{ partial "terms.html" (dict "taxonomy" "tags" "page" .) }}

      <div style="margin-top:2rem; padding-top:1rem; border-top:1px solid rgba(100,160,255,0.15);">
        <a href="/" style="color:#60a5fa; font-size:0.85rem; text-decoration:none; font-family:monospace;">← BACK TO INDEX</a>
      </div>

    </div>
  </div>
</div>
{{ end }}
